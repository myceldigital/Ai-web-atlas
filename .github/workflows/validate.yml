name: Validate atlas

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate structured company data
        run: python scripts/validate-data.py
